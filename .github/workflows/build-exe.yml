name: Build Executable

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-exe:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Read package version
        run: |
          VERSION="$(bun -e 'console.log(require("./package.json").version)')"
          echo "PACKAGE_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "BINARY_NAME=garcon-v${VERSION}-linux-x64" >> "$GITHUB_ENV"
          echo "RELEASE_ARCHIVE_NAME=garcon-v${VERSION}-linux-x64.tar.gz" >> "$GITHUB_ENV"

      - name: Install server dependencies
        working-directory: server
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Compile Paraglide messages
        working-directory: web
        run: bun run i18n:compile

      - name: Run checks
        run: bun run check

      - name: Run tests
        run: bun run test

      - name: Build web app
        run: bun run build

      - name: Compile Linux x64 executable
        run: bun run build-exe:compile

      - name: Smoke test executable
        run: bun run build-exe:smoke

      - name: Verify executable exists
        run: |
          if [ ! -f "dist/garcon" ]; then
            echo "Expected executable at dist/garcon"
            ls -la dist || true
            exit 1
          fi

          ls -la dist/garcon
          file dist/garcon || true

      - name: Prepare executable artifact
        run: |
          mkdir -p artifacts
          cp dist/garcon "artifacts/${BINARY_NAME}"

          ls -la artifacts

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}
          path: artifacts/${{ env.BINARY_NAME }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build-exe
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read package version
        run: |
          VERSION="$(bun -e 'console.log(require("./package.json").version)')"
          echo "PACKAGE_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "BINARY_NAME=garcon-v${VERSION}-linux-x64" >> "$GITHUB_ENV"
          echo "RELEASE_ARCHIVE_NAME=garcon-v${VERSION}-linux-x64.tar.gz" >> "$GITHUB_ENV"

      - name: Download executable artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}
          path: artifacts

      - name: Package release asset
        run: |
          if [ ! -f "artifacts/${BINARY_NAME}" ]; then
            echo "Missing downloaded executable artifact"
            ls -la artifacts || true
            exit 1
          fi

          tar -C artifacts -czf "artifacts/${RELEASE_ARCHIVE_NAME}" "${BINARY_NAME}"

      - name: List release artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f -name '*.tar.gz' | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          draft: true
          generate_release_notes: true
